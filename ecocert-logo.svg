<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 130" aria-label="Certifié Ecocert">
  <defs>
    <path id="ecocert-curve-top" d="M 14 68 Q 100 -10 186 68"/>
  </defs>
  <!-- Outer oval border -->
  <ellipse cx="100" cy="65" rx="94" ry="53" fill="none" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- ECOCERT text curved along top -->
  <text font-family="'Instrument Serif', Georgia, serif" font-weight="400" font-size="26" fill="#1a1a1a" letter-spacing="1.5" font-style="italic">
    <textPath href="#ecocert-curve-top" startOffset="50%" text-anchor="middle">ECOCERT</textPath>
  </text>
  <!-- Middle horizontal line (subtle) -->
  <line x1="60" y1="80" x2="140" y2="80" stroke="#1a1a1a" stroke-width="0.8"/>
  <!-- Bottom text -->
  <text x="100" y="100" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-weight="500" font-size="10" fill="#1a1a1a" letter-spacing="2.5">CERTIFIÉ BIO</text>
  <!-- R trademark mark -->
  <circle cx="178" cy="45" r="7" fill="none" stroke="#1a1a1a" stroke-width="1"/>
  <text x="178" y="48.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="500" fill="#1a1a1a">R</text>
</svg>
